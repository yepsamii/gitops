# traefik-values.yaml

# Expose Traefik on ports 80 and 443
ports:
  web:
    port: 80
    # No nodePort - let kind handle it
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    port: 443
    # No nodePort - let kind handle it

# Enable Dashboard
ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.local`)
    entryPoints:
      - websecure